name: Publish Trino Lance Plugin

on:
  release:
    types: [published]
  pull_request:
    paths:
      - .github/workflows/publish.yml
    types:
      - opened
      - synchronize
      - ready_for_review
      - reopened
  workflow_dispatch:
    inputs:
      mode:
        description: 'Release mode'
        required: true
        type: choice
        default: dry_run
        options:
          - dry_run
          - release
      ref:
        description: 'The branch, tag or SHA to checkout'
        required: false
        type: string

jobs:
  build-and-publish:
    name: Build and Publish Plugin
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: "maven"
          server-id: ossrh
          server-username: SONATYPE_USER
          server-password: SONATYPE_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Set github
        run: |
          git config --global user.email "Lance Github Runner"
          git config --global user.name "dev+gha@lancedb.com"

      - name: Get Trino version
        id: get_trino_version
        run: |
          TRINO_VERSION=$(grep '<trino.version>' pom.xml | sed 's/.*<trino.version>\(.*\)<\/trino.version>.*/\1/' | head -1)
          echo "trino_version=$TRINO_VERSION" >> $GITHUB_OUTPUT
          echo "Trino version: $TRINO_VERSION"

      - name: Dry run
        if: |
          github.event_name == 'pull_request' ||
          inputs.mode == 'dry_run'
        run: |
          mvn --batch-mode -DskipTests package

      - name: Publish to Maven Central
        if: |
          github.event_name == 'release' ||
          inputs.mode == 'release'
        run: |
          echo "use-agent" >> ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          export GPG_TTY=$(tty)
          mvn --batch-mode -DskipTests -DpushChanges=false -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }} deploy -P deploy-to-ossrh
        env:
          SONATYPE_USER: ${{ secrets.SONATYPE_USER }}
          SONATYPE_TOKEN: ${{ secrets.SONATYPE_TOKEN }}

      - name: Get published version
        if: |
          github.event_name == 'release' ||
          inputs.mode == 'release'
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Published version: $VERSION"

      - name: Wait for Maven Central availability
        if: |
          github.event_name == 'release' ||
          inputs.mode == 'release'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          GROUP_ID="org.lance"
          ARTIFACT_ID="lance-trino"

          echo "Waiting for version $VERSION to be available in Maven Central..."
          echo "This typically takes 10-30 minutes after publishing to OSSRH."

          MAX_WAIT=3600
          INTERVAL=60
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            URL="https://repo1.maven.org/maven2/org/lance/${ARTIFACT_ID}/${VERSION}/${ARTIFACT_ID}-${VERSION}.pom"

            if curl --head --silent --fail "$URL" > /dev/null 2>&1; then
              echo "lance-trino is available in Maven Central!"
              echo ""
              echo "Users can now add the following dependency to their projects:"
              echo ""
              echo "Maven:"
              echo "<dependency>"
              echo "  <groupId>org.lance</groupId>"
              echo "  <artifactId>lance-trino</artifactId>"
              echo "  <version>${VERSION}</version>"
              echo "</dependency>"
              exit 0
            else
              echo "lance-trino is not yet available. Waiting ${INTERVAL} seconds... (${ELAPSED}s elapsed)"
            fi

            ELAPSED=$((ELAPSED + INTERVAL))
            sleep $INTERVAL
          done

          echo ""
          echo "WARNING: Artifact not yet available in Maven Central after ${MAX_WAIT} seconds."
          echo "This is normal - Maven Central sync can take up to 2 hours."
          echo "Check: https://central.sonatype.com/artifact/org.lance/lance-trino/${VERSION}"
          exit 0

      - name: Prepare release artifacts
        if: |
          github.event_name == 'release' ||
          inputs.mode == 'release'
        id: prepare_artifacts
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TRINO_VERSION="${{ steps.get_trino_version.outputs.trino_version }}"

          # provisio creates a directory named after artifactId + version
          PLUGIN_DIR="plugin/trino-lance/target/lance-trino-${VERSION}"

          if [ ! -d "$PLUGIN_DIR" ]; then
            echo "Plugin directory not found at $PLUGIN_DIR"
            find plugin/trino-lance/target -type d -name "lance-trino*" | head -5
            exit 1
          fi

          ARTIFACT_NAME="lance-trino-${VERSION}-trino${TRINO_VERSION}"
          cd plugin/trino-lance/target
          zip -r "${ARTIFACT_NAME}.zip" "lance-trino-${VERSION}"
          tar -czvf "${ARTIFACT_NAME}.tar.gz" "lance-trino-${VERSION}"
          cd -

          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "Plugin contents:"
          ls -la "$PLUGIN_DIR"

      - name: Upload release assets
        if: |
          github.event_name == 'release' ||
          inputs.mode == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            plugin/trino-lance/target/${{ steps.prepare_artifacts.outputs.artifact_name }}.zip
            plugin/trino-lance/target/${{ steps.prepare_artifacts.outputs.artifact_name }}.tar.gz
          token: ${{ secrets.LANCE_RELEASE_TOKEN }}
